<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coming Soon</title>
  <!-- Bootstrap CSS -->
  <link href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">
  <style>
    /* Full-page background image */
    body, html {
      height: 100%;
      margin: 0;
      font-family: 'Poppins', sans-serif;
    }

    .bg-img {
      background-image: url('https://images7.alphacoders.com/136/thumb-1920-1365927.png');
      height: 100%;
      background-position: center;
      background-repeat: no-repeat;
      background-size: cover;
      position: relative;
      color: white;
      text-align: center;
    }

    /* Center content */
    .center-content {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
    }

    .center-content h2 {
      font-size: 50px;
      margin-bottom: 30px;
      font-weight: bold;
    }

    /* Loading bar */
    .progress {
      height: 50px;
      background-color: rgba(255, 255, 255, 0.2);
      border-radius: 20px;
      width: 300px;
      margin: 0 auto;
    }

    .progress-bar {
      width: 70%;
      background-color: rgb(54, 103, 217);
    }

    /* Bottom text alignment */
    .bottom-text {
      position: absolute;
      bottom: 20px;
      right: 20px; /* Align to the bottom right */
      text-align: right; /* Align text to the right */
    }

    .bottom-text h1 {
      font-size: 30px;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <div class="bg-img">
    <!-- Center content -->
    <div class="center-content">
      <h2>COMING SOON</h2>
      <!-- Loading bar -->
      <div class="progress">
        <div class="progress-bar progress-bar-striped progress-bar-animated"></div>
      </div>
    </div>

    <!-- Bottom text aligned to the bottom right -->
    <div class="bottom-text">
      <h1>DR. KANNAN DILIP</h1>
    </div>
  </div>

  <!-- Bootstrap JS (optional) -->
  <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js"></script>
  <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
</body>
</html>
