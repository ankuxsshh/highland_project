{% extends 'base.html' %}

{% load static %}

{% block title %}
  Contact Us
{% endblock %}

{% block content %}
  <section class="parallax-section">
    <div class="parallax-background about-parallax">
      <div class="container text-center text-white d-flex align-items-center justify-content-center">
        <div class="intro-text">
          <br />
          <h1 class="display-4 font-weight-bold">Contact Us</h1>
        </div>
      </div>
    </div>
  </section>

  <!-- Contact Form Section -->
  <section id="contact-form-section" class="container mt-5 pt-5">
    <div class="row d-flex justify-content-between align-items-center">
      <!-- Contact Form -->
      <div class="col-md-6">
        <div class="card p-4 bg-light" style="border-radius: 30px;">
          <h3 class="font-weight-bold mb-4 text-center">Send Us A Message</h3>
          <form>
            <div class="form-group mb-3">
              <label for="name">Name</label>
              <input type="text" class="form-control" id="name" placeholder="Enter your name" style="border-radius: 30px; height: 50px;" />
            </div>
            <div class="form-group mb-3">
              <label for="email">Email</label>
              <input type="email" class="form-control" id="email" placeholder="Enter your email" style="border-radius: 30px;height: 50px;" />
            </div>
            <div class="form-group mb-3">
              <label for="message">Message</label>
              <textarea class="form-control" id="message" rows="4" placeholder="Enter your message" style="border-radius: 30px"></textarea>
            </div>
            <button type="submit" class="btn btn-primary btn-block" style="border-radius: 30px;height: 50px;">Submit</button>
          </form>
        </div>
      </div>

      <!-- Google Map Section -->
      <div class="col-md-6 d-flex">
          <div class="text-center mt-2">
            <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d7808.89176067129!2d75.37442101321412!3d11.874009094253042!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3ba43d2e02804173%3A0x625862778439b3e0!2sHighland%20Properties!5e0!3m2!1sen!2sin!4v1727442523170!5m2!1sen!2sin" width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
          </div>
        </div>
      </div>
    </div>
  </section>

  <br />
  <br />

  <style>
    .parallax-background {
      background: linear-gradient(to bottom, rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.5)), url('https://www.adanirealty.com/-/media/project/realty/blogs/eoi-expression-of-interest-in-real-estate--a-comprehensive-guide.ashx') no-repeat center center;
      background-attachment: fixed;
      background-size: cover;
      height: 50vh;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 30px;
      margin: 20px;
    }
    
    .intro-text {
      text-shadow: 0 2px 4px rgba(0, 0, 0, 0.2);
      z-index: 2;
      font-family: 'Poppins', sans-serif;
      position: relative;
      color: white;
    }
    
    .scroll-down {
      animation: bounce 2s infinite;
      background-color: rgba(255, 255, 255, 0.3);
      padding: 10px 20px;
      border: none;
      border-radius: 5px;
      color: white;
      font-weight: bold;
      text-decoration: none;
    }
    
    .scroll-down:hover {
      background-color: rgba(255, 255, 255, 0.5);
    }
    
    @keyframes bounce {
      0%,
      100% {
        transform: translateY(0);
      }
      50% {
        transform: translateY(-10px);
      }
    }
    
    /* Styling for contact form and images */
    #contact-form-section .form-control {
      border-radius: 30px;
      font-family: 'Poppins', sans-serif;
    }
    
    #contact-form-section .btn {
      border-radius: 30px;
      font-family: 'Poppins', sans-serif;
    }
    
    .card {
      border-radius: 30px;
      font-family: 'Poppins', sans-serif;
    }
    
    #map {
      border-radius: 30px; /* Ensures the map has rounded corners */
      height: 500px;
      max-width: fit-content;
    }
  </style>
  <script src="https://maps.googleapis.com/maps/api/js?key=YOUR_API_KEY&callback=initMap" async defer></script>
{% endblock %}
